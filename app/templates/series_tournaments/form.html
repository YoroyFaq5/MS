{% extends "base.html" %}
{% block title %}Новый серийный турнир{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="mb-4">
      <h2 class="fw-bold mb-0"><i class="bi bi-collection-play me-2"></i>Новый серийный турнир</h2>
      <p class="text-muted small">Один турнир — несколько независимых игровых серий (вечеров)</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label fw-medium">Название <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control form-control-lg"
                   placeholder="Клубная лига — сезон 1" required autofocus>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Описание</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Описание турнира (необязательно)"></textarea>
          </div>

          <div class="mb-4">
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="is_ranked"
                     id="isRanked" checked value="1">
              <label class="form-check-label" for="isRanked">
                📈 <strong>Рейтинговый</strong> — игры влияют на глобальный рейтинг и ELO
              </label>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-check-lg me-1"></i>Создать
            </button>
            <a href="{{ url_for('series_tournaments.list_series_tournaments') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
