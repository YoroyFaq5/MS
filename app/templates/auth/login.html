{% extends "base.html" %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5 col-xl-4">

    <div class="text-center mb-4 mt-2">
      <div class="brand-monogram brand-monogram-lg mx-auto mb-2">MS</div>
      <h2 class="fw-bold mb-0">MAFIA STYLE</h2>
      <p class="text-muted small">Вход в закрытый клуб</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST" autocomplete="on">

          <div class="mb-3">
            <label class="form-label fw-medium">Логин</label>
            <div class="input-group">
              <span class="input-group-text bg-body-secondary border-end-0">
                <i class="bi bi-person text-muted"></i>
              </span>
              <input type="text" name="username" class="form-control border-start-0 ps-0"
                     placeholder="your_username" autocomplete="username"
                     required autofocus>
            </div>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between">
              <label class="form-label fw-medium">Пароль</label>
            </div>
            <div class="input-group">
              <span class="input-group-text bg-body-secondary border-end-0">
                <i class="bi bi-lock text-muted"></i>
              </span>
              <input type="password" name="password" id="passwordInput"
                     class="form-control border-start-0 border-end-0 ps-0"
                     placeholder="••••••" autocomplete="current-password" required>
              <button type="button" class="input-group-text bg-body-secondary border-start-0"
                      onclick="togglePassword()" tabindex="-1">
                <i class="bi bi-eye text-muted" id="eyeIcon"></i>
              </button>
            </div>
          </div>

          <div class="mb-4">
            <div class="form-check">
              <input class="form-check-input" type="checkbox" name="remember" id="remember">
              <label class="form-check-label text-muted small" for="remember">
                Запомнить меня
              </label>
            </div>
          </div>

          <button type="submit" class="btn btn-danger w-100 py-2 fw-semibold">
            <i class="bi bi-box-arrow-in-right me-2"></i>Войти
          </button>
        </form>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      Нет аккаунта?
      <a href="{{ url_for('auth.register') }}" class="text-danger text-decoration-none fw-medium">
        Зарегистрироваться
      </a>
    </p>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function togglePassword() {
  const inp = document.getElementById('passwordInput');
  const ico = document.getElementById('eyeIcon');
  if (inp.type === 'password') {
    inp.type = 'text';
    ico.className = 'bi bi-eye-slash text-muted';
  } else {
    inp.type = 'password';
    ico.className = 'bi bi-eye text-muted';
  }
}
</script>
{% endblock %}
