{% extends "base.html" %}
{% block title %}Смена пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-sm-10 col-md-7 col-lg-5">

    <div class="d-flex align-items-center gap-3 mb-4">
      <a href="{{ url_for('profile.own_profile') }}" class="btn btn-outline-secondary btn-sm">← Назад</a>
      <h2 class="mb-0 fw-bold">🔑 Смена пароля</h2>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-medium">Текущий пароль</label>
            <input type="password" name="current_password" class="form-control"
                   placeholder="••••••" required autofocus>
          </div>

          <hr class="my-3 opacity-25">

          <div class="mb-3">
            <label class="form-label fw-medium">Новый пароль</label>
            <input type="password" name="new_password" id="np"
                   class="form-control" placeholder="минимум 6 символов"
                   minlength="6" required>
            <div class="form-text">Минимум 6 символов</div>
          </div>

          <div class="mb-4">
            <label class="form-label fw-medium">Повторите новый пароль</label>
            <input type="password" name="confirm_password" id="cp"
                   class="form-control" placeholder="••••••"
                   minlength="6" required>
            <div class="form-text text-danger d-none" id="mismatch">Пароли не совпадают</div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4" id="submitBtn">
              <i class="bi bi-check-lg me-1"></i>Сохранить
            </button>
            <a href="{{ url_for('profile.own_profile') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>

        </form>
      </div>
    </div>

  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const np = document.getElementById('np');
const cp = document.getElementById('cp');
const msg = document.getElementById('mismatch');
const btn = document.getElementById('submitBtn');

function check() {
  if (!cp.value) { msg.classList.add('d-none'); return; }
  const ok = np.value === cp.value;
  msg.classList.toggle('d-none', ok);
  btn.disabled = !ok;
}
np.addEventListener('input', check);
cp.addEventListener('input', check);
</script>
{% endblock %}
