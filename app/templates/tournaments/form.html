{% extends "base.html" %}
{% block title %}Новый турнир{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-6">
    <div class="mb-4">
      <h2 class="fw-bold mb-0">🏆 Новый турнир</h2>
      <p class="text-muted small">Настройте параметры турнира</p>
    </div>

    <div class="card">
      <div class="card-body p-4">
        <form method="POST">

          <div class="mb-3">
            <label class="form-label fw-medium">Название <span class="text-danger">*</span></label>
            <input type="text" name="name" class="form-control form-control-lg"
                   placeholder="Весенний чемпионат" required autofocus>
          </div>

          <div class="mb-3">
            <label class="form-label fw-medium">Описание</label>
            <textarea name="description" class="form-control" rows="2"
                      placeholder="Описание турнира (необязательно)"></textarea>
          </div>

          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-medium">Тип турнира</label>
              <select name="type" class="form-select" id="typeSelect">
                <option value="individual">👤 Индивидуальный</option>
                <option value="team">👥 Командный</option>
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label fw-medium">Размер cutoff (финал)</label>
              <input type="number" name="cutoff_size" class="form-control"
                     value="10" min="2" max="50">
              <div class="form-text">Сколько игроков проходят в финал</div>
            </div>
          </div>

          <div class="mb-4">
            <div class="form-check form-switch mb-2">
              <input class="form-check-input" type="checkbox" name="is_ranked"
                     id="isRanked" checked value="1">
              <label class="form-check-label" for="isRanked">
                📈 <strong>Рейтинговый</strong> — игры влияют на глобальный рейтинг
              </label>
            </div>
            <div class="form-check form-switch">
              <input class="form-check-input" type="checkbox" name="has_stages"
                     id="hasStages" value="1">
              <label class="form-check-label" for="hasStages">
                📋 <strong>Многоэтапный</strong> — автосоздать Основной + Финальный этапы
              </label>
            </div>
          </div>

          <div class="d-flex gap-2">
            <button type="submit" class="btn btn-danger px-4">
              <i class="bi bi-check-lg me-1"></i>Создать
            </button>
            <a href="{{ url_for('tournaments.list_tournaments') }}" class="btn btn-outline-secondary">Отмена</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
